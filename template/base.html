<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>

    <!-- KaTeX CSS - always enabled -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css" integrity="sha384-GvrOXuhMATsiXqtIuwBpz/A4QppE6GJIY/GfU0/NIYiRcaHzRzJZMw/44htA8ZeM" crossorigin="anonymous">

    <!-- Code syntax highlight CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" integrity="sha512-P9tLXQRiU2JW665Y/PAFYbMw8QbD7+Zr8Rq+rbJ/YHQqdgZQqT6rKB/xQ+wQtpFE9pSMjY28Jt5fl9J+Y9cQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Include custom CSS if provided -->
    {{if .CSS}}
        <style>{{.CSS}}</style>
    {{end}}

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            line-height: 1.6;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            background-color: #fff;
            color: #333;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background-color: #1a1a1a;
                color: #e6e6e6;
            }
        }

        {{if eq .Theme "dark"}}
        body {
            background-color: #1a1a1a;
            color: #e6e6e6;
        }
        {{end}}

        h1, h2, h3, h4, h5, h6 {
            color: #2c3e50;
        }

        code {
            background-color: #f5f5f5;
            padding: 2px 4px;
            border-radius: 3px;
            font-family: 'Monaco', 'Consolas', 'Ubuntu Mono', monospace;
        }

        pre {
            background-color: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }

        blockquote {
            border-left: 4px solid #ddd;
            padding-left: 15px;
            color: #666;
            margin-left: 0;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin: 1em 0;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        .mermaid {
            text-align: center;
            margin: 2em 0;
        }
    </style>
</head>

<body>
    {{.Content}}

    <!-- KaTeX JS - always enabled -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js" integrity="sha384-9APjkHfWdCS7/LZCxHXpdrHue8g7/Bmw62h5SlZoju5ywJm0F0TqS1N8QXtK7a4p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js" integrity="sha384-y52rzLp0DgByN8NFGEivcw0/x584V4CK/EFLysqqMJFJ0C9jZ85EMO1csngCOmXmoiU" crossorigin="anonymous"></script>
    <script>
        // Global marker to indicate rendering completion
        window.katexRenderingComplete = false;
        
        // Ensure renderMathInElement is available before using it
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof renderMathInElement !== 'undefined') {
                renderMathInElement(document.body, {
                    delimiters: [
                        {left: "$$", right: "$$", display: true},
                        {left: "$", right: "$", display: false},
                        {left: "\\(", right: "\\)", display: false},
                        {left: "\\[", right: "\\]", display: true}
                    ],
                    ignoredTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
                    throwOnError: false
                });
                
                // Check if rendering finished
                setTimeout(() => {
                    if (document.querySelector('.katex') !== null) {
                        window.katexRenderingComplete = true;
                    }
                }, 500);
            } else {
                window.katexRenderingComplete = true; // If KaTeX not available, just mark as done
            }
        });
        
        // As fallback, if DOM already loaded
        if (document.readyState === 'interactive' || document.readyState === 'complete') {
            if (typeof renderMathInElement !== 'undefined') {
                setTimeout(() => {
                    renderMathInElement(document.body, {
                        delimiters: [
                            {left: "$$", right: "$$", display: true},
                            {left: "$", right: "$", display: false},
                            {left: "\\(", right: "\\)", display: false},
                            {left: "\\[", right: "\\]", display: true}
                        ],
                        ignoredTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
                        throwOnError: false
                    });
                    
                    setTimeout(() => {
                        if (document.querySelector('.katex') !== null) {
                            window.katexRenderingComplete = true;
                        }
                    }, 500);
                }, 50);
            } else {
                window.katexRenderingComplete = true;
            }
        }
    </script>

    <!-- Prism JS for code highlighting - always enabled -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js" integrity="sha512-YtIRpBM38R7y2FE+YL6LUjYUXX5JWsQzqP4HSu6i1GfNLRoeXe0ICUjwKJiPS5PuYy84zB/WY78c7gbB7H0w==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js" integrity="sha512-SkmE2RsZqJa+qP6lgBcD+W05hgYqNvKtDb+6MWCibxJL56a3R5rZPnCPiUfXWjw7FzC+ef2yVe3wcC4/7q30Q/" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- Apply highlighting to all code blocks immediately after DOM loads -->
    <script>
        if (document.readyState === 'loading') {
            document.addEventListener("DOMContentLoaded", function() {
                // Delay slightly to ensure content is in place
                setTimeout(() => {
                    if (window.Prism) {
                        window.Prism.highlightAll();
                    }
                }, 50); 
            });
        } else {
            setTimeout(() => {
                if (window.Prism) {
                    window.Prism.highlightAll();
                }
            }, 50);
        }
    </script>

    <!-- Mermaid JS - always enabled -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
    <script>
        // Manually configure and initialize Mermaid
        mermaid.initialize({ 
            startOnLoad: false,  // Disable automatic start to have more control 
            theme: '{{.Theme}}',
            securityLevel: 'loose',
            fontFamily: 'inherit',
            fontSize: '14px'
        });
        
        // Initialize mermaid after DOM is ready and KaTeX completes
        if (document.readyState === 'loading') {
            document.addEventListener("DOMContentLoaded", function() {
                setTimeout(function() {
                    // Process mermaid code blocks first
                    const mermaidCodeBlocks = document.querySelectorAll('pre code.language-mermaid, pre code.lang-mermaid, pre.mermaid > code');
                    
                    mermaidCodeBlocks.forEach(function(codeBlock, idx) {
                        const preElement = codeBlock.parentElement;
                        const graphDiv = document.createElement('div');
                        graphDiv.className = 'mermaid-diagram';
                        graphDiv.id = 'mermaid-diagram-' + idx;
                        graphDiv.style.margin = '20px 0';
                        
                        // Replace the code block with a diagram container
                        preElement.parentNode.replaceChild(graphDiv, preElement);
                        
                        // Render mermaid graph into the dedicated container
                        mermaid.render(
                            'generated-mermaid-' + idx,
                            codeBlock.textContent,
                            function(svgCode) {
                                graphDiv.innerHTML = svgCode;
                            }
                        );
                    });
                    
                    // Then run general init on any remaining mermaid elements
                    const remainingMermaids = document.querySelectorAll('.mermaid, pre.mermaid, .mermaid-diagram');
                    if(remainingMermaids.length > 0) {
                        mermaid.init(remainingMermaids);
                    }
                }, 800); // Allow time for KaTeX, then process diagrams
            });
        } else {
            // If already loaded, execute directly
            setTimeout(function() {
                const mermaidCodeBlocks = document.querySelectorAll('pre code.language-mermaid, pre code.lang-mermaid, pre.mermaid > code');
                
                mermaidCodeBlocks.forEach(function(codeBlock, idx) {
                    const preElement = codeBlock.parentElement;
                    const graphDiv = document.createElement('div');
                    graphDiv.className = 'mermaid-diagram';
                    graphDiv.id = 'mermaid-diagram-' + idx;
                    graphDiv.style.margin = '20px 0';
                    
                    preElement.parentNode.replaceChild(graphDiv, preElement);
                    
                    mermaid.render(
                        'generated-mermaid-' + idx,
                        codeBlock.textContent,
                        function(svgCode) {
                            graphDiv.innerHTML = svgCode;
                        }
                    );
                });
                
                const remainingMermaids = document.querySelectorAll('.mermaid, pre.mermaid, .mermaid-diagram');
                if(remainingMermaids.length > 0) {
                    mermaid.init(remainingMermaids);
                }
            }, 800);
        }
    </script>
</body>

</html>
