<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>

    <link rel="stylesheet" href="https://mirrors-1369730192.cos.ap-beijing.myqcloud.com/npm/inkforge/katex.min.css">
    <link rel="stylesheet" href="https://mirrors-1369730192.cos.ap-beijing.myqcloud.com/npm/inkforge/prism-tomorrow.min.css">

    {{if .CSS}}
        <style>{{.CSS}}</style>
    {{end}}

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            background-color: #fff;
            color: #333;
        }
        {{if eq .Theme "dark"}}
        body { background-color: #1a1a1a; color: #e6e6e6; }
        {{end}}
        h1, h2, h3, h4, h5, h6 { color: #2c3e50; }
        code { background-color: #f5f5f5; padding: 2px 4px; border-radius: 3px; font-family: 'Monaco', 'Consolas', monospace; }
        pre { background-color: #f5f5f5; padding: 10px; border-radius: 5px; overflow-x: auto; }
        blockquote { border-left: 4px solid #ddd; padding-left: 15px; color: #666; margin-left: 0; }
        table { border-collapse: collapse; width: 100%; margin: 1em 0; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .mermaid { text-align: center; margin: 2em 0; }
    </style>
</head>

<body>
    {{.Content}}

    <script src="https://mirrors-1369730192.cos.ap-beijing.myqcloud.com/npm/inkforge/katex.min.js"></script>
    <script src="https://mirrors-1369730192.cos.ap-beijing.myqcloud.com/npm/inkforge/auto-render.min.js"></script>
    <script src="https://mirrors-1369730192.cos.ap-beijing.myqcloud.com/npm/inkforge/prism.min.js"></script>
    <script src="https://mirrors-1369730192.cos.ap-beijing.myqcloud.com/npm/inkforge/prism-python.min.js"></script>
    <script src="https://mirrors-1369730192.cos.ap-beijing.myqcloud.com/npm/inkforge/prism-javascript.min.js"></script>
    <script src="https://mirrors-1369730192.cos.ap-beijing.myqcloud.com/npm/inkforge/prism-typescript.min.js"></script>
    <script src="https://mirrors-1369730192.cos.ap-beijing.myqcloud.com/npm/inkforge/prism-go.min.js"></script>
    <script src="https://mirrors-1369730192.cos.ap-beijing.myqcloud.com/npm/inkforge/prism-bash.min.js"></script>
    <script src="https://mirrors-1369730192.cos.ap-beijing.myqcloud.com/npm/inkforge/mermaid.min.js"></script>

    <script>
    (function() {
        function log(msg) { console.log('[RENDER] ' + msg); }
        log('Start');
        
        function checkAndRender() {
            // Check if all libraries are loaded
            var katexReady = typeof renderMathInElement === 'function';
            var prismReady = typeof Prism !== 'undefined';
            var mermaidReady = typeof mermaid !== 'undefined';
            
            log('Check: katex=' + katexReady + ' prism=' + prismReady + ' mermaid=' + mermaidReady);
            
            // If not all ready, try again in 500ms
            if (!katexReady || !prismReady || !mermaidReady) {
                setTimeout(checkAndRender, 500);
                return;
            }
            
            // All libraries loaded, render
            renderAll();
        }
        
        function renderAll() {
            log('Rendering...');
            
            // KaTeX
            if (typeof renderMathInElement === 'function') {
                renderMathInElement(document.body, {
                    delimiters: [
                        {left: "$$", right: "$$", display: true},
                        {left: "$", right: "$", display: false},
                        {left: "\\(", right: "\\)", display: false},
                        {left: "\\[", right: "\\]", display: true}
                    ],
                    ignoredTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
                    throwOnError: false
                });
            }
            log('KaTeX done');
            
            // Prism
            if (typeof Prism !== 'undefined') {
                Prism.highlightAll();
            }
            log('Prism done');
            
            // Mermaid
            if (typeof mermaid !== 'undefined') {
                mermaid.initialize({ startOnLoad: false, theme: '{{.Theme}}' || 'default', securityLevel: 'loose' });
                
                var blocks = document.querySelectorAll('pre code.language-mermaid');
                log('Found ' + blocks.length + ' mermaid blocks');
                
                blocks.forEach(function(block, i) {
                    var pre = block.parentElement;
                    var code = block.textContent.trim();
                    var div = document.createElement('div');
                    div.className = 'mermaid';
                    div.id = 'mermaid-' + i;
                    div.textContent = code;
                    pre.parentNode.replaceChild(div, pre);
                });
                
                mermaid.run({ querySelector: '.mermaid' }).then(function() {
                    log('Mermaid done');
                });
            }
            
            // Mark complete after delay
            setTimeout(function() {
                var marker = document.createElement('div');
                marker.id = 'render-complete';
                document.body.appendChild(marker);
                log('Complete');
            }, 2000);
        }
        
        // Start checking
        setTimeout(checkAndRender, 1000);
    })();
    </script>
</body>

</html>
