<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    
    <!-- KaTeX CSS - always enabled for compatibility -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css" crossorigin="anonymous">

    <!-- Include custom CSS if provided -->
    {{if .CSS}}
        <style>{{.CSS}}</style>
    {{end}}
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            line-height: 1.6;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            background-color: #fff;
            color: #333;
        }
        
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #1a1a1a;
                color: #e6e6e6;
            }
        }
        
        {{if eq .Theme "dark"}}
        body {
            background-color: #1a1a1a;
            color: #e6e6e6;
        }
        {{end}}
        
        h1, h2, h3, h4, h5, h6 {
            color: #2c3e50;
        }
        
        code {
            background-color: #f5f5f5;
            padding: 2px 4px;
            border-radius: 3px;
            font-family: 'Monaco', 'Consolas', 'Ubuntu Mono', monospace;
        }
        
        pre {
            background-color: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
        
        blockquote {
            border-left: 4px solid #ddd;
            padding-left: 15px;
            color: #666;
            margin-left: 0;
        }
        
        table {
            border-collapse: collapse;
            width: 100%;
            margin: 1em 0;
        }
        
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        
        th {
            background-color: #f2f2f2;
        }
        
        .mermaid {
            text-align: center;
            margin: 2em 0;
        }
    </style>
</head>
<body>
    {{.Content}}

    <!-- KaTeX JS - always enabled -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
    <script>
        // Global marker to indicate rendering completion
        window.katexRenderingComplete = false;
        
        // Configuration for all math rendering scenarios
        const katexOptions = {
            delimiters: [
                {left: "$$", right: "$$", display: true},
                {left: "$", right: "$", display: false},
                {left: "\\(", right: "\\)", display: false},
                {left: "\\[", right: "\\]", display: true}
            ],
            ignoredTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
            throwOnError: false // Don't crash if math has errors
        };
        
        // Function to attempt KaTeX rendering multiple ways
        window.renderMath = function() {
            try {
                // Ensure the DOM is ready before rendering
                if (document.body) {
                    renderMathInElement(document.body, katexOptions);
                    // Small delay to allow rendering to complete
                    setTimeout(() => {
                        window.katexRenderingComplete = true;
                    }, 100);
                }
            } catch (e) {
                console.warn("KaTeX rendering error:", e.message);
                window.katexRenderingComplete = true; // Mark as done even if error
            }
        };
        
        // Initial rendering - try multiple times with delays to ensure DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener("DOMContentLoaded", function() {
                setTimeout(window.renderMath, 100);
            });
        } else {
            // Even if not loading, still use a small delay to ensure content is inserted
            setTimeout(window.renderMath, 100);
        }
    </script>

    <!-- Mermaid JS - always enabled -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({ startOnLoad: true });
    </script>
</body>
</html>
