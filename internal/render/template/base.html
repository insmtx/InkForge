<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>

    <!-- KaTeX CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    
    <!-- Prism CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">

    <!-- Include custom CSS if provided -->
    {{if .CSS}}
        <style>{{.CSS}}</style>
    {{end}}

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            background-color: #fff;
            color: #333;
        }

        {{if eq .Theme "dark"}}
        body {
            background-color: #1a1a1a;
            color: #e6e6e6;
        }
        {{end}}

        h1, h2, h3, h4, h5, h6 {
            color: #2c3e50;
        }

        code {
            background-color: #f5f5f5;
            padding: 2px 4px;
            border-radius: 3px;
            font-family: 'Monaco', 'Consolas', monospace;
        }

        pre {
            background-color: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }

        blockquote {
            border-left: 4px solid #ddd;
            padding-left: 15px;
            color: #666;
            margin-left: 0;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin: 1em 0;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        .mermaid {
            text-align: center;
            margin: 2em 0;
        }
    </style>
</head>

<body>
    {{.Content}}

    <!-- Load libraries -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-typescript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-go.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

    <!-- Synchronous rendering - runs immediately -->
    <script>
    (function() {
        window._renderLog = [];
        function log(msg) {
            window._renderLog.push(msg);
            console.log('[RENDER] ' + msg);
        }
        
        log('Start');

        // STEP 1: KaTeX - render immediately
        log('KaTeX...');
        if (typeof renderMathInElement === 'function') {
            renderMathInElement(document.body, {
                delimiters: [
                    {left: "$$", right: "$$", display: true},
                    {left: "$", right: "$", display: false},
                    {left: "\\(", right: "\\)", display: false},
                    {left: "\\[", right: "\\]", display: true}
                ],
                ignoredTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
                throwOnError: false
            });
        }
        log('KaTeX: ' + document.querySelectorAll('.katex').length);

        // STEP 2: Prism - highlight immediately
        log('Prism...');
        if (typeof Prism !== 'undefined') {
            Prism.highlightAll();
        }
        log('Prism: ' + document.querySelectorAll('.token').length);

        // STEP 3: Mermaid
        log('Mermaid...');
        
        function renderMermaid() {
            if (typeof mermaid === 'undefined') {
                log('Mermaid not loaded');
                return;
            }

            mermaid.initialize({ 
                startOnLoad: false, 
                theme: '{{.Theme}}' || 'default',
                securityLevel: 'loose'
            });

            // Find all mermaid code blocks
            var blocks = document.querySelectorAll('pre code.language-mermaid');
            log('Mermaid blocks: ' + blocks.length);

            if (blocks.length === 0) {
                log('No mermaid');
                return;
            }

            // Replace pre>code with div.mermaid
            blocks.forEach(function(block, i) {
                var pre = block.parentElement;
                var code = block.textContent.trim();
                
                var div = document.createElement('div');
                div.className = 'mermaid';
                div.id = 'mermaid-' + i;
                div.textContent = code;
                
                pre.parentNode.replaceChild(div, pre);
            });

            // Use mermaid.run
            mermaid.run({
                querySelector: '.mermaid'
            }).then(function(results) {
                log('Mermaid rendered: ' + results.length);
            }).catch(function(err) {
                log('Mermaid error: ' + err.message);
            });
        }

        renderMermaid();

        // Mark complete
        setTimeout(function() {
            var marker = document.createElement('div');
            marker.id = 'render-complete';
            document.body.appendChild(marker);
            log('Done');
        }, 2000);

    })();
    </script>
</body>

</html>
